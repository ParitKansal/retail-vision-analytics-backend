  entry_exit_service:
    build: ./services/entry_exit_service
    container_name: entry_exit_service
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOKI_URL=http://loki:3100/loki/api/v1/push
      - TZ=Asia/Kolkata
      - INPUT_RTSP=rtsp://CAMERA_USER:CAMERA_PASS@192.168.10.2:554/live
      # - INPUT_RTSP=rtsp://192.168.2.106:8554/entrance
      - GROUP_NAME=cg:cam:entry_exit_service
      - YOLO_SERVICE_URL=http://age_gender_yolo_service:8083/predict
      - OUTPUT_QUEUE_NAME_1=database:queue:0
      - TARGET_COLLECTION_NAME=entry_exit_collection
      - CONFIG_PATH=/workspace/config.json
      - VISUALIZE=True
    cpuset: "0-13"
    networks:
      - app_network
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
    depends_on:
      - redis
      - loki
      - grafana
      - db_service
      - mongodb
      - age_gender_yolo_service
      - db_sync_service

  exit_emotion_detection_service:
    build: ./services/exit_service
    container_name: exit_emotion_detection_service
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOKI_URL=http://loki:3100/loki/api/v1/push
      - TZ=Asia/Kolkata
      - INPUT_QUEUE_NAME=stream:cam:6
      - GROUP_NAME=cg:cam:exit_emotion_detection_service
      - OUTPUT_QUEUE_NAME_1=database:queue:0
      - TARGET_COLLECTION=customer_emotions
      - TARGET_FPS=1
      - VISUALIZE=True
    cpuset: "0-13"
    volumes:
      - ./services/exit_service/face_detection_06022026.pt:/workspace/face_detection_06022026.pt
      - ./services/exit_service/bnb_4bit_model:/workspace/bnb_4bit_model
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    networks:
      - app_network
    depends_on:
      - redis
      - loki
      - grafana
      - db_service
