  customer_path_tracking_service:
    build: ./services/customer_path_tracking_service
    container_name: customer_path_tracking_service
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOKI_URL=http://loki:3100/loki/api/v1/push
      - TZ=Asia/Kolkata
      # - RTSP_URL=rtsp://CAMERA_USER:CAMERA_PASS@192.168.10.13:554/live
      - INPUT_QUEUE_NAME=stream:cam:1
      - OUTPUT_QUEUE_NAME_1=database:queue:0
      - GROUP_NAME=cg:cam:customer_path
      - CAMERA_ID=1
      - SAMPLE_FPS=6
    cpuset: "0-13"
    networks:
      - app_network
    depends_on:
      - redis
      - loki
      - stream_handling_service
    volumes:
      - ./services/customer_path_tracking_service/person_detection_model_17_02_2026.pt:/workspace/person_detection_model_17_02_2026.pt
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  store_opening_closing_service:
    build: ./services/store_opening_closing_service
    container_name: store_opening_closing_service
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOKI_URL=http://loki:3100/loki/api/v1/push
      - TZ=Asia/Kolkata
      - INPUT_QUEUE_NAME=stream:cam:6
      - GROUP_NAME=cg:cam:store_opening_closing_service
      - OUTPUT_QUEUE_NAME=store_status_output
      - ALERT_QUEUE_NAME=database:queue:0
    cpuset: "0-13"
    networks:
      - app_network
    depends_on:
      - redis
      - loki
      - stream_handling_service

  dirty_floor_service:
    build: ./services/dirty_floor_service
    container_name: dirty_floor_service
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOKI_URL=http://loki:3100/loki/api/v1/push
      - TZ=Asia/Kolkata
      # Handle multiple queues by splitting with comma, or script logic
      - INPUT_QUEUE_NAMES=stream:cam:1,stream:cam:7
      - GROUP_NAME=cg:cam:dirty_floor_service
      - MODEL_PATH=/workspace/ViT_HQQ_LoRA_Masked_16_03_2026_(1).pth
      # MASK_SET_NAME handled internally by camera ID mapping in service.py
      - VISUALIZE=True
      - BUFFER_DURATION_SECONDS=60
      - DIRTY_THRESHOLD_PERCENT=90
      - CLEAN_THRESHOLD_PERCENT=50
      - OUTPUT_QUEUE_NAME=database:queue:0
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=all
    cpuset: "0-13"
    runtime: nvidia
    volumes:
      - ./services/dirty_floor_service/ViT_HQQ_LoRA_Masked_16_03_2026_(1).pth:/workspace/ViT_HQQ_LoRA_Masked_16_03_2026_(1).pth
    networks:
      - app_network
    depends_on:
      - redis
      - loki
      - stream_handling_service

