    cpuset: "0-13"
    volumes:
      - ./services/table_occupancy_left_lobby/artifacts:/workspace/artifacts
    networks:
      - app_network
    depends_on:
      - redis
      - loki
      - stream_handling_service
      # - grounding_dino_service
      # - yolo_service
      - grafana
      - db_service
      - mongodb
      - db_sync_service

  table_occupancy_cafe:
    build: ./services/table_occupancy_cafe
    container_name: table_occupancy_cafe
    environment:
      - REDIS_HOST=redis
