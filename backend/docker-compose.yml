      - LOGGING_SERVICE_NAME=table_occupancy_cafe
      - VISUALIZE=True
      - BUFFER_SIZE=60
      - PERCENTAGE_DIRTY_IN_BUFFER=34
      - PERCENTAGE_OCCUPIED_IN_BUFFER=34
      - CONSECUTIVE_CLEAN_FOR_RESOLUTION=60
      - CONSECUTIVE_UNOCCUPIED_FOR_RESOLUTION=60
      - CONFIG_UPDATE_INTERVAL=1800
      - CONFIG_UPDATE_IOU_THRESHOLD=0.1001
    cpuset: "0-13"
    volumes:
