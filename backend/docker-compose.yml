      - YOLO_MODEL_URL=http://yolo_service:8082/predict
      - PLATE_MODEL_URL=http://yolo_service:8082/predict
      - LOGGING_SERVICE_NAME=table_occupancy_left_lobby
      - VISUALIZE=True
