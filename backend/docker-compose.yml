  table_occupancy_kiosk:
    build: ./services/table_occupancy_kiosk
    container_name: table_occupancy_kiosk
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOKI_URL=http://loki:3100/loki/api/v1/push
      - TZ=Asia/Kolkata
