  kiosk_person_service:
    build: ./services/kiosk_person_service
    container_name: kiosk_person_service
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOKI_URL=http://loki:3100/loki/api/v1/push
      - TZ=Asia/Kolkata
      - INPUT_QUEUE_NAME=stream:cam:6
      - GROUP_NAME=cg:cam:kiosk_person_service
      - OUTPUT_QUEUE_NAME=database:queue:0
      - YOLO_MODEL_URL=http://yolo_service:8082/predict
      - VISUALIZE=True
      - TARGET_COLLECTION_NAME=kiosk_person_collection
    networks:
      - app_network
    cpuset: "0-13"
    depends_on:
      - redis
      - loki
      - stream_handling_service
      - db_service
      - mongodb
      - yolo_service
      - db_sync_service

  db_service:
    build: ./services/db_service
    container_name: db_service
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:?MONGO_PASSWORD is required}@mongodb:27017/?replicaSet=rs0&authSource=admin
      - MONGO_DB=tolichowki
      - LOKI_URL=http://loki:3100/loki/api/v1/push
      - TZ=Asia/Kolkata
      - INPUT_QUEUE_NAME=database:queue:0
    cpuset: "0-13"
    networks:
      - app_network
    depends_on:
      - redis
      - loki
      - mongodb

  db_sync_service:
    build: ./services/db_sync_service
    container_name: db_sync_service
    environment:
      - MONGODB_SOURCE=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:?MONGO_PASSWORD is required}@mongodb:27017/?replicaSet=rs0&authSource=admin
      - MONGODB_DESTINATION=${MONGODB_DESTINATION:?MONGODB_DESTINATION is required}
      - MONGODB_NAME=tolichowki
      - LOKI_URL=http://loki:3100/loki/api/v1/push
      - SYNC_DURATION=0.5
      - TZ=Asia/Kolkata
    cpuset: "0-13"
    networks:
      - app_network
    depends_on:
      - redis
      - loki
      - mongodb
      - db_service

  stream_handling_service:
    build:
      context: ./services/stream_handling_service
      dockerfile: Dockerfile.stream
    container_name: stream_handling_service
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_PASSWORD:-minioadmin}
      - MINIO_BUCKET=frames
      - LOKI_URL=http://loki:3100/loki/api/v1/push
      - TZ=Asia/Kolkata
    cpuset: "0-13"
    shm_size: 2g
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - app_network
    depends_on:
      - redis
      - minio
      - loki
      - grafana
      - mongodb
      - delete_service

  yolo_service:
    build:
      context: ./services/yolo_service
      dockerfile: Dockerfile.plate
    container_name: yolo_service
    ports:
      - "8082:8082"
    environment:
      - REDIS_HOST=redis
      - LOKI_URL=http://loki:3100/loki/api/v1/push
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - TZ=Asia/Kolkata
      - DEVICE=cuda
      - PORT=8082
      - MODEL_ID=plate_detection_model_19_01_2026.pt
    cpuset: "0-13"
    runtime: nvidia
    networks:
      - app_network
    depends_on:
      - redis
      - loki
      - grafana

  age_gender_yolo_service:
    build:
      context: ./services/yolo_service
      dockerfile: Dockerfile.age_gender
    container_name: age_gender_yolo_service
    ports:
      - "8083:8083"
    environment:
      - REDIS_HOST=redis
      - LOKI_URL=http://loki:3100/loki/api/v1/push
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - TZ=Asia/Kolkata
      - DEVICE=cuda
      - PORT=8083
      - MODEL_ID=age_gender_yolo.pt
    cpuset: "0-13"
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    networks:
      - app_network
    depends_on:
      - redis
      - loki
      - grafana

  staff_customer_classification_service:
    build: ./services/staff_customer_classification_service
    container_name: staff_customer_classification_service
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - LOKI_URL=http://loki:3100/loki/api/v1/push
      - MODEL_PATH=/workspace/classifier_customer_vs_staff.pkl
      - DEVICE=cuda
      - NVIDIA_VISIBLE_DEVICES=all
    runtime: nvidia
    volumes:
      - ./services/staff_customer_classification_service/classifier_customer_vs_staff.pkl:/workspace/classifier_customer_vs_staff.pkl
    networks:
      - app_network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    depends_on:
      - redis
      - loki

  ip_monitor_service:
    build: ./services/ip_monitor_service
    container_name: ip_monitor_service
    environment:
      - TZ=Asia/Kolkata
    env_file:
      - ./services/ip_monitor_service/.env
    volumes:
      - ./services/ip_monitor_service/last_ip.txt:/app/last_ip.txt
    networks:
      - app_network
    restart: always

  video_classification_service:
    build: ./services/video_classification_service
    container_name: video_classification_service
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - XCLIP_MODEL_URL=http://xclip_service:8085/predict
      - LOKI_URL=http://loki:3100/loki/api/v1/push
      - TZ=Asia/Kolkata
    cpuset: "0-13"
    networks:
      - app_network
    depends_on:
      - redis
      - loki
      - grafana
      - mongodb
      - minio
      - db_service
      - stream_handling_service
      - xclip_service

  xclip_service:
    build: ./services/xclip_service
    container_name: xclip_service
    environment:
      - TZ=Asia/Kolkata
      - LOKI_URL=http://loki:3100/loki/api/v1/push
      - PORT=8085
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=all
    runtime: nvidia
    networks:
      - app_network
    restart: always
    depends_on:
      - redis
      - loki
      - minio
    ports:
      - "8085:8085"
    volumes:
      - ./services/xclip_service/models:/workspace/models
