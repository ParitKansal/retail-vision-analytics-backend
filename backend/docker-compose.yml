# version: '3.8'

services:
  # mongodb:
  #   image: mongodb/mongodb-community-server:latest
  #   container_name: mongodb
  #   ports:
  #     - "27018:27017"
  #   environment:
  #     - MONGODB_INITDB_ROOT_USERNAME=admin
  #     - MONGODB_INITDB_ROOT_PASSWORD=your_mongo_password
  #   volumes:
  #     - mongo_data:/data/db
  #   cpuset: "0-13"
  #   networks:
  #     - app_network
  #   dns:
  #     - 127.0.0.11
  mongodb:
    build: ./services/mongodb
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:?MONGO_PASSWORD is required}
      - REPL_SET_NAME=rs0
    networks:
      - app_network
    dns:
      - 127.0.0.11
    volumes:
      - mongo_data:/data/db

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD:-minioadmin}
      - TZ=Asia/Kolkata
    command: server /data --console-address ":9001"
    cpuset: "0-13"
    networks:
      - app_network

  redis:
    image: bitnami/redis:latest
    container_name: redis
    user: root
    ports:
      - "6379:6379"
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - TZ=Asia/Kolkata
    cpuset: "0-13"
    networks:
      - app_network
    # volumes:
    #   - ./redis_data:/bitnami/redis/data

  loki:
    image: grafana/loki:latest
    container_name: loki
    user: "0"
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./loki-config.yaml:/etc/loki/loki-config.yaml
      - loki_data:/loki
    environment:
      - TZ=Asia/Kolkata
    ports:
      - "3100:3100"
    # cpuset: "0-13"
    networks:
      - app_network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - TZ=Asia/Kolkata
    ports:
      - "3000:3000"
    cpuset: "0-13"
    networks:
      - app_network

  delete_service:
    build:
      context: ./services/stream_handling_service
      dockerfile: Dockerfile.delete
    container_name: delete_service
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_PASSWORD:-minioadmin}
      - MINIO_BUCKET=frames
      - DELETE_DUR=2
      - TZ=Asia/Kolkata
    networks:
      - app_network
    depends_on:
      - redis
      - minio

  counter_staff_detection_service1:
    build: ./services/counter_staff_detection_service
    container_name: counter_staff_detection_service1
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOKI_URL=http://loki:3100/loki/api/v1/push
      - TZ=Asia/Kolkata
      - INPUT_QUEUE_NAME=stream:cam:1
      - GROUP_NAME=cg:cam:counter_staff_detection1
      - OUTPUT_QUEUE_NAME_1=database:queue:0
      - YOLO_MODEL_URL=http://yolo_service:8082/predict
      - TARGET_COLLECTION_NAME=counter_staff_collection
      - STAFF_CUSTOMER_CLASSIFICATION_URL=http://staff_customer_classification_service:8000/predict
      - VISUALIZE=True
    cpuset: "0-13"
    networks:
      - app_network
    depends_on:
      - redis
      - loki
      - stream_handling_service
      # - yolo_service
      - grafana
      - db_service
      - mongodb
      - db_sync_service
    volumes:
      - ./services/counter_staff_detection_service:/workspace

  cafe_counter_staff_detection_service:
    build: ./services/cafe_counter_staff_detection_service
    container_name: cafe_counter_staff_detection_service
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOKI_URL=http://loki:3100/loki/api/v1/push
      - TZ=Asia/Kolkata
      - INPUT_QUEUE_NAME=stream:cam:2
      - GROUP_NAME=cg:cam:counter_staff_detection2
      - OUTPUT_QUEUE_NAME_1=database:queue:0
      - YOLO_MODEL_URL=http://yolo_service:8082/predict
      - TARGET_COLLECTION_NAME=counter_staff_collection
      - VISUALIZE=True
      - STAFF_CUSTOMER_CLASSIFICATION_URL=http://staff_customer_classification_service:8000/predict
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=all
    cpuset: "0-13"
    runtime: nvidia
    networks:
      - app_network
    depends_on:
      - redis
      - loki
      - stream_handling_service
      - grafana
      - db_service
      - mongodb
      - yolo_service
      - db_sync_service
    env_file:
      - ./services/cafe_counter_staff_detection_service/.env
    volumes:
      - ./viz_output_cam2:/workspace/viz_output
      - ./services/cafe_counter_staff_detection_service/artifacts/insightface_models:/workspace/insightface_models

  table_occupancy_back_lobby:
    build: ./services/table_occupancy_back_lobby
    container_name: table_occupancy_back_lobby
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOKI_URL=http://loki:3100/loki/api/v1/push
      - TZ=Asia/Kolkata
      - INPUT_QUEUE_NAME=stream:cam:3
      - GROUP_NAME=cg:cam:table_detection_and_cleaning1
      - KMEANS_MODEL_PATH=/workspace/artifacts/kmeans_model_back_lobby.pkl
      - OUTPUT_QUEUE_NAME_1=database:queue:0
      # - GROUNDING_DINO_URL=http://grounding_dino_service:8081/predict
      - YOLO_MODEL_URL=http://yolo_service:8082/predict
      - PLATE_MODEL_URL=http://yolo_service:8082/predict
      - LOGGING_SERVICE_NAME=table_occupancy_back_lobby
      - VISUALIZE=True
      - BUFFER_SIZE=30
      - PERCENTAGE_DIRTY_IN_BUFFER=80
      - PERCENTAGE_OCCUPIED_IN_BUFFER=80
      - CONSECUTIVE_CLEAN_FOR_RESOLUTION=30
      - CONSECUTIVE_UNOCCUPIED_FOR_RESOLUTION=30
      - CONFIG_UPDATE_INTERVAL=1800
      - CONFIG_UPDATE_IOU_THRESHOLD=0.8
      # - ROTATION=ROTATE_90_COUNTERCLOCKWISE
      # - MASK_PATH=/workspace/artifacts/mask_model_video_1.json
    cpuset: "0-13"
    volumes:
      - ./services/table_occupancy_back_lobby/artifacts:/workspace/artifacts
    networks:
      - app_network
    depends_on:
      - redis
      - loki
      - stream_handling_service
      # - grounding_dino_service
      # - yolo_service
      - grafana
      - db_service
      - mongodb
      - db_sync_service

  table_occupancy_left_lobby:
    build: ./services/table_occupancy_left_lobby
    container_name: table_occupancy_left_lobby
